<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Example</title>
    <!-- Link CSS untuk Font Awesome (untuk ikon sosial media) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- Link ke Tailwind CSS (jika belum di-include) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<footer class="bg-gray-800 text-white py-8">
    <div class="container mx-auto px-6 md:px-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Kolom 1: Panel Admin -->
            <div>
                <h3 class="text-lg font-semibold mb-4">Panel Admin</h3>
                <p class="text-sm">
                    Kelola properti, pengguna, dan laporan di panel admin. Pantau kinerja situs dengan mudah.
                </p>
            </div>
            <!-- Kolom 2: Link Navigasi Admin -->
            <div>
                <h3 class="text-lg font-semibold mb-4">Navigasi Admin</h3>
                <ul>
                    <li><a href="#dashboard" class="text-sm hover:text-primary transition duration-300">Dashboard</a></li>
                    <li><a href="#manage_properties" class="text-sm hover:text-primary transition duration-300">Manajemen Properti</a></li>
                    <li><a href="#user_management" class="text-sm hover:text-primary transition duration-300">Manajemen Pengguna</a></li>
                    <li><a href="#reports" class="text-sm hover:text-primary transition duration-300">Laporan</a></li>
                </ul>
            </div>
            <!-- Kolom 3: Sosial Media -->
            <div>
                <h3 class="text-lg font-semibold mb-4">Sosial Media</h3>
                <div class="flex space-x-4">
                    <a href="#" class="text-2xl text-gray-400 hover:text-white transition duration-300"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="text-2xl text-gray-400 hover:text-white transition duration-300"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="text-2xl text-gray-400 hover:text-white transition duration-300"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="text-2xl text-gray-400 hover:text-white transition duration-300"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">© 2025 PropertyHub. All rights reserved. | Admin Panel</p>
        </div>
    </div>
</footer>


</body>
</html>
